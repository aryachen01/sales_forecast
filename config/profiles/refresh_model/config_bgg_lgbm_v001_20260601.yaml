# =============================================================================
# Unified config: refresh_model / v001 (20260601) — bq_gcp_bq 生产场景
# =============================================================================
# 与 config_bll_lgbm_v001_20260601.yaml 同数据源/同模型线，
# 差异点：
#   1. 场景为 bq_gcp_bq：BQ 读 → GCP 执行 → 结果写回 BQ + GCS
#   2. 本地输出路径不设置（使用系统默认 /tmp，适合 Cloud Run）
#   3. Tuning 搜索空间扩展：新增 n_estimators，扩大 num_leaves 上限
#   4. random_seed 改为 2025，n_iter 增至 60（与本地 bll 版本结果略有差异）
# =============================================================================

versioning:
  model_line: refresh_model
  version: v001

# ── 输出路径覆盖（GCS 路径覆盖系统默认）──────────────────────────────────────
output:
  # local_output_dir: 不设置，Cloud Run 使用 /tmp（系统默认）
  gcs_output_uri: 'gs://ocp_model_archive/refresh_model/v001_20260601'

# ── 数据来源（按场景）────────────────────────────────────────────────────────
source:
  bq_local_local:
    source_table: "ingka-cn-cop-stage.ikea_da_test.archen_model_base_with_y_r4w"
    source_filters:
      sales_channel: "Store"
      product_cluster: "热销商品"
  bq_gcp_bq:
    source_table: "ingka-cn-cop-stage.ikea_da_test.archen_model_base_with_y_r4w"
    source_filters:
      sales_channel: "Store"
      product_cluster: "热销商品"
  gcs_gcp_gcs:
    source_csv_uri: ""
  local_local_local:
    source_csv_local_path: ""

# ── BQ 输出表名（bq_gcp_bq 场景写回 BigQuery 时使用）──────────────────────────
bq_tables:
  bq_pred_table: "ingka-cn-cop-stage.ikea_da_test.refresh_model_pred_train_test_detail"
  bq_model_meta_table: "ingka-cn-cop-stage.ikea_da_test.refresh_model_metadata"
  bq_feat_imp_table: "ingka-cn-cop-stage.ikea_da_test.refresh_model_feature_importance_detail"
  bq_metrics_by_split_table: "ingka-cn-cop-stage.ikea_da_test.refresh_model_metrics_by_split"
  bq_run_eval_metrics_table: "ingka-cn-cop-stage.ikea_da_test.refresh_model_run_eval_metrics"

# ── 业务运行参数 ──────────────────────────────────────────────────────────────
runtime:
  label_column: item_qty_weekly
  time_column: week_no
  min_train_rows: 95

  sample_key_columns:
    - sales_channel
    - market_area_no_orig
    - hfb_code
    - product_cluster
    - week_no

  entity_id_columns:
    - sales_channel
    - hfb_code
    - product_cluster

  entity_discovery:
    enabled: true

  time_windows:
    train_start: "202401"
    train_end: "202552"
    test_start: "202601"
    test_end: "202617"

  in_sample_validation:
    enabled: true
    validation_ratio: 0.2
    split_mode: random
    random_seed: 42

  tuning:
    enabled: true
    method: random
    n_iter: 30                     # ← 降低至 30 次，减少内存峰值（原 60）
    random_seed: 2025              # ← 不同随机种子，与 bll 版结果略有差异
    internal_validation_ratio: 0.2
    internal_split_mode: random
    objective:
      primary: mae_min
      secondary: accuracy_strict_nonzero_max
      mae_tie_tolerance: 1.0e-9
    search_space:
      n_estimators: [100, 200, 300]              # ← 去掉 500，降低单次 trial 内存峰值
      num_leaves: [50, 80, 120, 150, 200]          # ← 上限从 150 扩至 200（去掉 31，更关注复杂结构）
      max_depth: [5, 7, 10, 15, -1]
      learning_rate: [0.01, 0.02, 0.05, 0.1, 0.15]
      min_child_samples: [8, 12, 20, 32, 50]
      feature_fraction: [0.6, 0.7, 0.8, 0.9, 1.0]
      bagging_fraction: [0.6, 0.7, 0.8, 0.9, 1.0]
      lambda_l1: [0, 0.1, 1, 5, 10]
      lambda_l2: [0, 0.1, 1, 5, 10]

  evaluation:
    requested_dimensions: []
    include_total: true
    include_entity: true
    split_name_map:
      train: train
      validation: validation
      test: test

  # ────────────────────────────────────────────────────────────────────────
  # 特征列表：与 bll 版本一致（132 个特征，实际可用 99 个）
  # ────────────────────────────────────────────────────────────────────────
