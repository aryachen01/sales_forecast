# ── 模型超参 ──────────────────────────────────────────────────────────────────
model:
  active: lightgbm

  decision_tree:
    algorithm_name: "DT"
    version: "v001"
    max_depth: 6
    min_samples_split: 24
    min_samples_leaf: 12
    max_features: "sqrt"
    random_state: 42
    description: "Decision Tree baseline for Store x hfb_code x product_cluster"

  lightgbm:
    algorithm_name: "LGBM"
    version: "v001"
    num_leaves: 31
    max_depth: 6
    learning_rate: 0.05
    n_estimators: 200
    min_data_in_leaf: 12
    reg_alpha: 0.1
    reg_lambda: 0.1
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    random_state: 42
    verbose: -1
    description: "LightGBM for Store x hfb_code x product_cluster — bq_gcp_bq production run"
