# =============================================================================
# Unified config: refresh_model / v001 (20260601)
# =============================================================================
# 新模型线 - 使用 ikea_da_test.archen_model_base_with_y_r4w 特征宽表
# 特征列表来源：feature_list_20260601_refresh_model.csv (is_in_refresh_model = 1)
# 总计 132 个特征
# 
# 模型线说明：
#   - item_channel_ma_week: 商品-渠道-市场区域-周粒度（原有模型）
#   - item_day: 商品-日粒度（另一模型线）
#   - refresh_model: 新的模型迭代方向，使用扩展特征宽表
# =============================================================================

versioning:
  model_line: refresh_model
  version: v001

# ── 输出路径覆盖（可选，不填则使用 scenario_defaults 的系统默认）────────────
output:
  local_output_dir: 'C:\Users\arche24\KnowledgeBase\model_predict_by_weekly\20_modeling\bq_local_runs\refresh_model\v001_20260601'
  # gcs_output_uri: 'gs://custom/bucket'   # 如需覆盖 GCS 默认路径，取消注释

# ── 数据来源（按场景）────────────────────────────────────────────────────────
source:
  bq_local_local:
    source_table: "ingka-cn-cop-stage.ikea_da_test.archen_model_base_with_y_r4w"
    source_filters:
      sales_channel: "Store"
      product_cluster: "热销商品"
  bq_gcp_bq:
    source_table: "ingka-cn-cop-stage.ikea_da_test.archen_model_base_with_y_r4w"
    source_filters:
      sales_channel: "Store"
      product_cluster: "热销商品"
  gcs_gcp_gcs:
    source_csv_uri: ""   # 填入 runners/export_source_data_to_gcs.py 输出的 GCS URI
  local_local_local:
    source_csv_local_path: ""   # 填入本地 CSV 路径

# ── BQ 输出表名（仅 bq_gcp_bq 场景写回 BigQuery 时使用）──────────────────────
bq_tables:
  bq_pred_table: "ingka-cn-cop-stage.ikea_da_test.refresh_model_pred_train_test_detail"
  bq_model_meta_table: "ingka-cn-cop-stage.ikea_da_test.refresh_model_metadata"
  bq_feat_imp_table: "ingka-cn-cop-stage.ikea_da_test.refresh_model_feature_importance_detail"
  bq_metrics_by_split_table: "ingka-cn-cop-stage.ikea_da_test.refresh_model_metrics_by_split"
  bq_run_eval_metrics_table: "ingka-cn-cop-stage.ikea_da_test.refresh_model_run_eval_metrics"

# ── 业务运行参数 ──────────────────────────────────────────────────────────────
runtime:
  label_column: item_qty_weekly
  time_column: week_no
  min_train_rows: 95

  sample_key_columns:
    - sales_channel
    - market_area_no_orig
    - hfb_code
    - product_cluster
    - week_no
    - basket_id_sk    # added for item-level prediction join

  entity_id_columns:
    - sales_channel
    - hfb_code
    - product_cluster

  entity_discovery:
    enabled: true

  time_windows:
    train_start: "202401"
    train_end: "202552"
    test_start: "202601"
    test_end: "202617"

  in_sample_validation:
    enabled: true
    validation_ratio: 0.2
    split_mode: random
    random_seed: 42

  tuning:
    enabled: true
    method: random
    n_iter: 50
    random_seed: 42
    internal_validation_ratio: 0.2
    internal_split_mode: random
    objective:
      primary: mae_min
      secondary: accuracy_strict_nonzero_max
      mae_tie_tolerance: 1.0e-9
    search_space:
      num_leaves: [31, 50, 80, 120, 150]
      max_depth: [5, 7, 10, 15, -1]
      learning_rate: [0.01, 0.02, 0.05, 0.1, 0.15]
      min_child_samples: [8, 12, 20, 32, 50]
      feature_fraction: [0.6, 0.7, 0.8, 0.9, 1.0]
      bagging_fraction: [0.6, 0.7, 0.8, 0.9, 1.0]
      lambda_l1: [0, 0.1, 1, 5, 10]
      lambda_l2: [0, 0.1, 1, 5, 10]

  evaluation:
    requested_dimensions: []
    include_total: true
    include_entity: true
    split_name_map:
      train: train
      validation: validation
      test: test

  # ────────────────────────────────────────────────────────────────────────
  # 特征列表：从 feature_list_20260601_refresh_model.csv 提取
  # 条件：is_in_refresh_model = 1
