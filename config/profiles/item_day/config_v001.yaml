# =============================================================================
# Unified config: item_day / v001
# =============================================================================
# 包含本次运行所需的全部参数，加载时与 config/system/scenario_defaults.yaml 合并：
#   - output.*      → 覆盖 scenario_defaults 中的默认输出路径
#   - source.*      → 注入各场景的数据来源
#   - bq_tables.*   → BQ 输出表名（仅 bq_gcp_bq 场景使用）
#   - runtime.*     → 业务参数（实体粒度、特征、时间窗等）
#   - model.*       → 模型超参
# =============================================================================

versioning:
  model_line: item_day
  version: v001

# ── 输出路径覆盖（可选，不填则使用 scenario_defaults 的系统默认）────────────
output:
  local_output_dir: 'C:\Users\arche24\KnowledgeBase\model_predict_by_weekly\20_modeling\bq_local_runs'
  # gcs_output_uri: 'gs://custom/bucket'   # 如需覆盖 GCS 默认路径，取消注释

# ── 数据来源（按场景）────────────────────────────────────────────────────────
source:
  bq_local_local:
    source_table: "ingka-cn-cop-stage.ikea_da_temp.temp_store_ma582_sampled_items_modeling_202605"
    source_filters:
      # sales_channel: ""   # 空字符串 = 不限制，保留为模板
      # sales_category: ""
  bq_gcp_bq:
    source_table: "ingka-cn-cop-stage.ikea_da_temp.temp_store_ma582_sampled_items_modeling_202605"
  gcs_gcp_gcs:
    source_csv_uri: ""   # 填入 runners/export_source_data_to_gcs.py 输出的 GCS URI
  local_local_local:
    source_csv_local_path: ""   # 填入本地 CSV 路径

# ── BQ 输出表名（仅 bq_gcp_bq 场景写回 BigQuery 时使用）──────────────────────
bq_tables:
  bq_pred_table: "ingka-cn-cop-stage.ikea_da_test.dt_pred_train_test_detail"
  bq_model_meta_table: "ingka-cn-cop-stage.ikea_da_test.dt_model_metadata"
  bq_feat_imp_table: "ingka-cn-cop-stage.ikea_da_test.dt_feature_importance_detail"
  bq_metrics_by_split_table: "ingka-cn-cop-stage.ikea_da_test.dt_metrics_by_split"
  bq_run_eval_metrics_table: "ingka-cn-cop-stage.ikea_da_test.dt_run_eval_metrics"

# ── 业务运行参数 ──────────────────────────────────────────────────────────────
runtime:
  label_column: item_qty
  time_column: day_date
  min_train_rows: 95

  sample_key_columns:
    - item_no
    - day_date

  entity_id_columns:
    - item_no

  model_name_columns:
    - item_no

  entity_discovery:
    enabled: true

  time_windows:
    train_start: "2024-01-01"
    train_end: "2025-12-31"
    test_start: "2026-01-01"
    test_end: "2026-04-30"

  in_sample_validation:
    enabled: true
    validation_ratio: 0.2
    split_mode: random
    random_seed: 42

  tuning:
    enabled: true
    method: random
    n_iter: 20
    random_seed: 42
    internal_validation_ratio: 0.2
    internal_split_mode: random
    objective:
      primary: mae_min
      secondary: accuracy_strict_nonzero_max
      mae_tie_tolerance: 1.0e-9
    search_space: {}   # 使用代码内置默认搜索空间

  evaluation:
    requested_dimensions: []
    include_total: true
    include_entity: true
    split_name_map:
      train: train
      validation: validation
      test: test

  features:
    - lag_qty_7
    - lag_qty_14
    - lag_qty_28
    - rolling_std_14
    - rolling_std_28
    - nonzero_rate_28
    - nonzero_days_7
    - is_workday
    - is_holiday
    - is_dayoff
    - is_holiday_special
    - is_service_discount
    - is_order_manjian
    - is_order_manzhe
    - is_item_combo
    - is_camp_start_week
    - is_camp_end_week
    - is_in_scin
    - discount_ratio
    - discount_ratio_recode
    - same_wd_median_4
    - same_wd_median_8
    - same_wd_median_13
    - is_sunny
    - tavg
    - day_name_long
    - holiday_name
    - holiday_tag

# ── 模型超参 ──────────────────────────────────────────────────────────────────
model:
  active: decision_tree

  decision_tree:
    algorithm_name: "DT"
    version: "v001"
    max_depth: 5
    min_samples_split: 24
    min_samples_leaf: 12
    max_features: "sqrt"
    random_state: 42
    description: "Decision Tree baseline for item_no x day_date"

  lightgbm:
    algorithm_name: "LGBM"
    version: "v001"
    num_leaves: 31
    max_depth: 5
    learning_rate: 0.05
    n_estimators: 200
    min_data_in_leaf: 12
    reg_alpha: 0.1
    reg_lambda: 0.1
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    random_state: 42
    verbose: -1
    description: "LightGBM baseline for item_no x day_date"
